<script>
  function injectCategoryButtons() {
    if (document.querySelector('.category-buttons')) return;
    
    var target = document.querySelector('article') || document.querySelector('.page > .content');
    if (!target) return;
    
    var div = document.createElement('div');
    div.className = 'category-buttons';
    div.style.cssText = 'text-align:center; padding: 0.8rem 0 1.2rem; margin-bottom: 1.5rem;';
    div.innerHTML = `
      <a href="/JiwonKoo.github.io/" style="display:inline-block;padding:0.3rem 1rem;margin:0.2rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555;font-size:0.9rem;background:#7C3AED;color:#fff;border-color:#7C3AED;">All</a>
      <a href="/JiwonKoo.github.io/category/whs/" style="display:inline-block;padding:0.3rem 1rem;margin:0.2rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555;font-size:0.9rem;">WHS</a>
      <a href="/JiwonKoo.github.io/category/blockchain/" style="display:inline-block;padding:0.3rem 1rem;margin:0.2rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555;font-size:0.9rem;">Blockchain</a>
      <a href="/JiwonKoo.github.io/category/cs/" style="display:inline-block;padding:0.3rem 1rem;margin:0.2rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555;font-size:0.9rem;">CS</a>
      <a href="/JiwonKoo.github.io/category/project/" style="display:inline-block;padding:0.3rem 1rem;margin:0.2rem;border:1px solid #ccc;border-radius:6px;text-decoration:none;color:#555;font-size:0.9rem;">Project</a>
    `;
    
    target.parentNode.insertBefore(div, target);
  }

  document.addEventListener('DOMContentLoaded', injectCategoryButtons);
  document.getElementById('_pushState') && document.getElementById('_pushState').addEventListener('hy-push-state-after', injectCategoryButtons);
</script>

{% comment %}
<!--
Example code for using Matamo as alternative analytics solution.
-->
{% if site.matomo_analytics %}
<script>
  var _paq = _paq || [];

  /*{% if site.matomo_analytics.no_cookies %}*/
  _paq.push(['disableCookies']);
  /*{% endif %}*/

  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['setTrackerUrl', u+'piwik.php']);
  _paq.push(['setSiteId', '{{site.matomo_analytics.site_id}}']);

  var pushStateEl = document.getElementById('_pushState');
  var timeStartLoadPage, referer, timeItTookToLoadPage;

  pushStateEl.addEventListener('hy-push-state-start', function() {
    timeStartLoadPage = new Date().getTime();
    referer = window.location.toString();
  });

  pushStateEl.addEventListener('hy-push-state-ready', function() {
    timeItTookToLoadPage = new Date().getTime() - timeStartLoadPage;
  });

  pushStateEl.addEventListener('hy-push-state-after', function() {
    _paq.push(['setReferrerUrl', referer]);
    _paq.push(['setCustomUrl', window.location.toString()]);
    _paq.push(['setDocumentTitle', document.title]);
    _paq.push(['deleteCustomVariables', 'page']);
    _paq.push(['setGenerationTimeMs', timeItTookToLoadPage]);
    _paq.push(['trackPageView']);
  });

  window.loadJSDeferred('{{site.matomo_analytics.root}}piwik.js');
</script>
{% endif %}
{% endcomment %}
